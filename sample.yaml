# Sample ESPHome configuration for an IoTaWatt with the stock ESP8266 swapped
# for an ESP32-S3, driven by this component. This mirrors a real working build
# and documents the full peripheral wiring.
#
# SECRETS: replace the api encryption key, OTA password, and AP password below,
# and define wifi_ssid / wifi_password in your secrets.yaml. Never commit real
# keys/passwords.
#
# Flash the FIRST time over USB (esp32-s3, USB-CDC). After that, OTA works.
#
# Edit the `inputs:` list to match YOUR installation:
#   * channel 0 is the reference voltage transformer (VT) -- set `model` + `cal`.
#   * every other channel is a CT clamp -- set the correct `model`, `channel`,
#     `name`, and (for 240V/double-pole breakers) `double: true` / `vphase`.
#   * `reverse: true` flips a CT reading if a clamp is installed backwards.
#   See PHASE_TABLES in components/iotawatt/sensor.py for supported VT/CT models.
#
# See the README pin table for the ESP8266(NodeMCU)->ESP32-S3 rewiring.
#
# Pin map (ESP32-S3) used below:
#   GPIO11 MOSI  GPIO12 CLK  GPIO13 MISO   (SPI to both MCP3208 ADCs)
#   GPIO7  ADC0 CS   GPIO10 ADC1 CS
#   GPIO4  SD card CS (held HIGH, unused)
#   GPIO14 I2C SDA   GPIO15 I2C SCL        (M41T81 RTC @ 0x68)
#   GPIO21 onboard WS2812 RGB
#   GPIO6 / GPIO5    external bi-color status LED legs
#
# Status indicators (optional niceties shown here, driven by the health interval):
#   * Onboard RGB LED (GPIO21): red=no WiFi  amber=WiFi up/HA disconnected
#       magenta=connected but no valid AC reference (not sampling)  green=healthy.
#   * External bi-color panel LED (GPIO6/GPIO5): green=healthy, red=any problem.

substitutions:
  node_name: iotawatt
  node_id: iotawatt
  friendly_node_name: "IoTaWatt"
  device_description: "IoTaWatt energy monitor (ESP32-S3 swap)"

esphome:
  name: ${node_name}
  friendly_name: ${friendly_node_name}
  comment: ${device_description}
  # Deselect the SD card as EARLY as possible (before the ADC SPI transactions):
  # the SD card shares the SPI bus, so its CS (GPIO4) must be held HIGH or it can
  # corrupt ADC reads. This complements the gpio switch below.
  on_boot:
    - priority: 900
      then:
        - switch.turn_on: sd_card_cs_hold
    # RGB LED: blue while booting until the first connectivity evaluation runs.
    - priority: -100
      then:
        - light.turn_on:
            id: onboard_led
            brightness: 60%
            red: 0%
            green: 0%
            blue: 100%
    # Peripheral enumeration banner (logged once at boot).
    - priority: -200
      then:
        - lambda: |-
            const char* TAG = "peripherals";
            ESP_LOGI(TAG, "==================================================");
            ESP_LOGI(TAG, "IoTaWatt - connected peripheral enumeration");
            ESP_LOGI(TAG, "--------------------------------------------------");
            ESP_LOGI(TAG, "SPI ADCs (IoTaWatt MCP3208 x2):");
            ESP_LOGI(TAG, "    CLK=GPIO12  MOSI=GPIO11  MISO=GPIO13");
            ESP_LOGI(TAG, "    ADC0 CS=GPIO7   ADC1 CS=GPIO10");
            ESP_LOGI(TAG, "SD Card (unused): CS=GPIO4 held HIGH (deselected)");
            ESP_LOGI(TAG, "Onboard RGB LED (WS2812): DATA=GPIO21");
            ESP_LOGI(TAG, "External bi-color LED: GPIO6 + GPIO5");
            ESP_LOGI(TAG, "I2C RTC (STMicro M41T81):");
            ESP_LOGI(TAG, "    SDA=GPIO14  SCL=GPIO15  expected 7-bit addr 0x68");
            ESP_LOGI(TAG, "System: free heap=%u bytes, min free=%u bytes",
                     (unsigned) esp_get_free_heap_size(),
                     (unsigned) esp_get_minimum_free_heap_size());
            ESP_LOGI(TAG, "==================================================");

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

# The IoTaWatt component for the ESP32-S3 hardware swap.
external_components:
  - source:
      type: git
      url: https://github.com/juchong/esphome-iotawatt
    refresh: 0s

logger:
  level: INFO

globals:
  - id: rgb_state
    type: int
    restore_value: no
    initial_value: '-1'

# Time source required by the total_daily_energy sensors (local-midnight reset).
# Synced from Home Assistant over the API; swap for `sntp` if you prefer.
time:
  - platform: homeassistant
    id: ha_time

# I2C bus for the M41T81 RTC (GPIO14/15). `scan: true` logs devices at boot (0x68).
# ESPHome has no stock M41T81 time platform, so this only detects the RTC.
i2c:
  id: bus_rtc
  sda: 14
  scl: 15
  scan: true
  frequency: 100kHz

# External bi-color panel LED legs, driven as plain GPIO outputs.
# On this build green = GPIO6 LOW + GPIO5 HIGH; red is the reverse (determined
# empirically -- swap the turn_on/turn_off below if your colors are reversed, or
# add `inverted: true` if the LED is common-anode).
output:
  - platform: gpio
    id: led_d0   # bi-color leg A (was NodeMCU D0)
    pin: GPIO6
  - platform: gpio
    id: led_d3   # bi-color leg B (was NodeMCU D3)
    pin: GPIO5

# Onboard WS2812 RGB on GPIO21 (wired RGB-order on this board, not the usual GRB).
light:
  - platform: esp32_rmt_led_strip
    id: onboard_led
    name: "Onboard LED"
    pin: GPIO21
    num_leds: 1
    chipset: WS2812
    rgb_order: RGB
    entity_category: diagnostic

# Connectivity/health indicator: evaluate current state every few seconds and set
# BOTH LEDs. State-based (not edge-based) so a transient drop can never leave a
# stale indication.
interval:
  - interval: 3s
    then:
      - lambda: |-
          bool wifi_ok = wifi::global_wifi_component->is_connected();
          bool api_ok = api::global_api_server->is_connected();
          float ref_v = id(ref_voltage).state;
          bool sampling = !isnan(ref_v) && ref_v > 1.0f;
          int s;
          if (!wifi_ok) s = 0;            // red
          else if (!api_ok) s = 1;        // amber
          else if (!sampling) s = 2;      // magenta
          else s = 3;                     // green (healthy)
          if (s == id(rgb_state)) return;
          id(rgb_state) = s;
          // Onboard RGB: detailed state color
          auto call = id(onboard_led).turn_on();
          call.set_brightness(0.6f);
          if (s == 0) call.set_rgb(1.0f, 0.0f, 0.0f);        // red     FF0000
          else if (s == 1) call.set_rgb(1.0f, 0.50f, 0.0f);  // amber   FF8000
          else if (s == 2) call.set_rgb(1.0f, 0.0f, 1.0f);   // magenta FF00FF
          else call.set_rgb(0.0f, 1.0f, 0.0f);               // green   00FF00
          call.perform();
          // External bi-color LED: green when healthy, red on any problem.
          if (s == 3) {
            id(led_d0).turn_off();   // GPIO6 LOW
            id(led_d3).turn_on();    // GPIO5 HIGH -> green
          } else {
            id(led_d0).turn_on();    // GPIO6 HIGH
            id(led_d3).turn_off();   // GPIO5 LOW  -> red
          }

# Hold the SD card's chip-select HIGH so it stays off the shared SPI bus.
switch:
  - platform: gpio
    id: sd_card_cs_hold
    name: "SD Card CS Hold"
    pin: 4
    restore_mode: ALWAYS_ON
    entity_category: diagnostic

# Device health diagnostics (heap, loop time, reset reason).
debug:
  update_interval: 30s

api:
  encryption:
    # Generate your own: `openssl rand -base64 32`
    key: "REPLACE_WITH_YOUR_BASE64_API_ENCRYPTION_KEY"

ota:
  - platform: esphome
    password: "REPLACE_WITH_YOUR_OTA_PASSWORD"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  fast_connect: true

  # Fallback hotspot (captive portal) if wifi fails
  ap:
    ssid: "IoTaWatt-Setup"
    password: "REPLACE_WITH_YOUR_AP_PASSWORD"

captive_portal:

web_server:
  port: 80

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    block:
      name: "Heap Max Block"
    loop_time:
      name: "Loop Time"

  # IoTaWatt energy monitoring.
  # SPI pin defaults match the Waveshare ESP32-S3-Tiny wiring. Adjust if your
  # ESP32-S3 board is wired differently.
  - platform: iotawatt
    id: ${node_id}
    update_interval: 30s
    clk_pin: 12
    mosi_pin: 11
    miso_pin: 13
    cs_pin_0: 7
    cs_pin_1: 10
    inputs:
      # --- Reference voltage transformer (channel 0) --------------------------
      # Set `model` + `cal` to match your actual VT.
      - channel: 0
        name: "Reference"
        type: "VT"
        model: "JW-95001-NA"
        cal: 11.12
        voltage:
          name: "Reference Voltage"
          id: ref_voltage
        frequency:
          name: "Reference Frequency"

      # --- Mains (240V split-phase example) -----------------------------------
      # Set the correct CT `model` and `channel` for your feeds.
      - channel: 1
        name: "Main L1"
        type: "CT"
        model: "AcuCT-H100-200"
        reverse: true
        power:
          name: "L1 Power"
          id: ${node_id}_l1_power
        current:
          name: "L1 Current"
        power_factor:
          name: "L1 PF"
      - channel: 2
        name: "Main L2"
        type: "CT"
        model: "AcuCT-H100-200"
        reverse: true
        power:
          name: "L2 Power"
          id: ${node_id}_l2_power
        current:
          name: "L2 Current"
        power_factor:
          name: "L2 PF"

      # --- Branch circuits ----------------------------------------------------
      # Add your remaining CTs here, e.g.:
      # - channel: 3
      #   name: "Dryer"
      #   type: "CT"
      #   model: "AcuCT-H063-100"
      #   double: true      # 240V double-pole breaker
      #   vphase: 120.0
      #   power:
      #     name: "Dryer Power"
      #   current:
      #     name: "Dryer Current"

  # Total of both mains legs.
  - platform: template
    name: "Total Power"
    id: ${node_id}_total_power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    lambda: |-
      return id(${node_id}_l1_power).state + id(${node_id}_l2_power).state;

  # --------------------------------------------------------------------------
  # Energy (kWh) totals for the Home Assistant Energy dashboard.
  # total_daily_energy integrates a power sensor and resets at local midnight,
  # reporting device_class: energy / state_class: total_increasing -- exactly
  # what the Energy dashboard expects. The 0.001 multiply converts Wh -> kWh.
  # Give every CT `power:` block an `id:` (as with the mains below) and add one
  # total_daily_energy sensor per channel you want to track. Use the mains
  # (grid consumption) as the Energy dashboard's grid source, and add branch
  # circuits as "individual devices".
  # --------------------------------------------------------------------------
  - platform: total_daily_energy
    name: "L1 Energy"
    power_id: ${node_id}_l1_power
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    unit_of_measurement: kWh
  - platform: total_daily_energy
    name: "L2 Energy"
    power_id: ${node_id}_l2_power
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    unit_of_measurement: kWh
  - platform: total_daily_energy
    name: "Total Energy"
    power_id: ${node_id}_total_power
    accuracy_decimals: 3
    filters: [{ multiply: 0.001 }]
    unit_of_measurement: kWh
  # Example branch-circuit energy sensor (add one per CT `power:` id):
  # - platform: total_daily_energy
  #   name: "Dryer Energy"
  #   power_id: ${node_id}_dryer_power
  #   accuracy_decimals: 3
  #   filters: [{ multiply: 0.001 }]
  #   unit_of_measurement: kWh
